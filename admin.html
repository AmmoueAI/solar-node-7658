<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="src/index.css">
</head>
<body class="p-8">
  <div id="login-screen" class="max-w-md mx-auto mt-20 card">
    <h2 class="text-xl mb-4">Admin Access</h2>
    <input type="password" id="pin" placeholder="Enter PIN" class="w-full p-2 bg-[var(--surface-2)] border border-[var(--border)] mb-4">
    <button onclick="verify()" class="btn-primary w-full">Authenticate</button>
  </div>

  <div id="dashboard" class="hidden max-w-5xl mx-auto">
    <h2 class="text-2xl mb-6">Upcoming Appointments</h2>
    <div id="bookings-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
  </div>

  <script>
    async function verify() {
      const pin = document.getElementById('pin').value;
      const res = await fetch('/api/verify-admin', { method: 'POST', body: JSON.stringify({ pinAttempt: pin }) });
      if (res.ok) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        loadBookings();
        setInterval(loadBookings, 60000);
      }
    }

    async function loadBookings() {
      try {
        const res = await fetch('https://www.ammoue.dev/api/booking?business_id=biz_ikajm1l5');
        const data = await res.json();
        const bookings = Array.isArray(data) ? data : (data.bookings || []);
        const list = document.getElementById('bookings-list');
        list.innerHTML = bookings.map(b => `<div class="card"><h3>${b.customer_name}</h3><p>${b.booking_date} at ${b.booking_time}</p></div>`).join('');
      } catch(e) { console.error(e); }
    }
  </script>
</body>
</html>
